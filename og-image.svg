<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e16"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0e16"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c076"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#c49a6c"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#5fb38e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" rx="24" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>
  <!-- Z Logo -->
  <rect x="80" y="180" width="160" height="160" rx="32" fill="#151a24" stroke="url(#gold)" stroke-width="3"/>
  <text x="160" y="310" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="120" fill="url(#gold)">Z</text>
  <!-- Title -->
  <text x="300" y="250" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="72" fill="#e2e8f0" letter-spacing="4">ZEN ASSETS</text>
  <!-- Subtitle -->
  <text x="300" y="310" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="28" fill="url(#gold)">AI Investment Platform — Automated Crypto &amp; Stock Trading</text>
  <!-- Stats bar -->
  <rect x="80" y="400" width="1040" height="1" fill="url(#gold)" opacity="0.2"/>
  <text x="160" y="460" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="36" fill="url(#greenGrad)">$97B+</text>
  <text x="160" y="490" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="16" fill="#94a3b8">Assets Managed</text>
  <text x="420" y="460" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="36" fill="url(#greenGrad)">15-85%</text>
  <text x="420" y="490" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="16" fill="#94a3b8">APY Returns</text>
  <text x="680" y="460" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="36" fill="url(#greenGrad)">247K+</text>
  <text x="680" y="490" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="16" fill="#94a3b8">Active Investors</text>
  <text x="940" y="460" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="36" fill="url(#greenGrad)">24/7</text>
  <text x="940" y="490" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="16" fill="#94a3b8">AI Trading</text>
  <!-- URL -->
  <text x="600" y="575" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="22" fill="url(#gold)" opacity="0.8">zenassets.tech</text>
</svg>
