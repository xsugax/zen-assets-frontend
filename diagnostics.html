<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZEN ASSETS - Data Flow Diagnostics</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0e16;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      color: #5fb38e;
      margin-bottom: 20px;
      font-size: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .panel {
      background: rgba(21, 26, 36, 0.8);
      border: 1px solid rgba(95, 179, 142, 0.2);
      border-radius: 8px;
      padding: 16px;
      max-height: 600px;
      overflow-y: auto;
    }

    .panel h2 {
      color: #d4a574;
      font-size: 14px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .log {
      background: rgba(10, 14, 22, 0.5);
      border: 1px solid rgba(95, 179, 142, 0.1);
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 10px;
      max-height: 150px;
      overflow-y: auto;
      font-size: 10px;
      line-height: 1.4;
    }

    .log-entry {
      margin-bottom: 4px;
      color: #8b98ad;
    }

    .log-entry.tick {
      color: #5fb38e;
    }

    .log-entry.update {
      color: #4a9ca6;
    }

    .log-entry.chart {
      color: #d4a574;
    }

    .log-entry.error {
      color: #d65d5d;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 8px;
      background: rgba(255,255,255,0.02);
      border-radius: 4px;
    }

    .stat-label {
      color: #8b98ad;
    }

    .stat-value {
      color: #5fb38e;
      font-weight: bold;
    }

    .status {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status.online {
      background: #5fb38e;
      box-shadow: 0 0 8px rgba(95, 179, 142, 0.5);
    }

    .status.offline {
      background: #d65d5d;
      box-shadow: 0 0 8px rgba(214, 93, 93, 0.5);
    }

    button {
      background: rgba(95, 179, 142, 0.2);
      border: 1px solid rgba(95, 179, 142, 0.4);
      color: #5fb38e;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      margin-right: 8px;
      margin-top: 10px;
    }

    button:hover {
      background: rgba(95, 179, 142, 0.4);
    }

    .warning {
      background: rgba(214, 93, 93, 0.1);
      border-left: 3px solid #d65d5d;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 4px;
      color: #d65d5d;
    }

    @media (max-width: 1024px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 ZEN ASSETS - Data Flow Diagnostics</h1>
    
    <div class="warning" id="warning-panel" style="display: none;">
      ⚠️ <strong>ISSUES DETECTED:</strong> <span id="warning-text"></span>
    </div>

    <div class="grid">
      <!-- WebSocket Status -->
      <div class="panel">
        <h2>🔌 WebSocket Connections</h2>
        <div id="ws-status"></div>
      </div>

      <!-- Real Data Adapter -->
      <div class="panel">
        <h2>📊 Real Data Adapter</h2>
        <div id="rda-status"></div>
      </div>

      <!-- Market Data -->
      <div class="panel">
        <h2>💹 Market Data Engine</h2>
        <div id="md-status"></div>
      </div>

      <!-- Chart Engine -->
      <div class="panel">
        <h2>📈 Chart Engine</h2>
        <div id="chart-status"></div>
      </div>
    </div>

    <div class="grid">
      <!-- Tick Log -->
      <div class="panel">
        <h2>📥 Tick Arrivals (Last 20)</h2>
        <div class="log" id="tick-log"></div>
      </div>

      <!-- Update Log -->
      <div class="panel">
        <h2>🔄 Price Updates (Last 20)</h2>
        <div class="log" id="update-log"></div>
      </div>

      <!-- Chart Updates -->
      <div class="panel">
        <h2>📊 Chart Updates (Last 20)</h2>
        <div class="log" id="chart-log"></div>
      </div>

      <!-- Performance -->
      <div class="panel">
        <h2>⚙️ Performance Metrics</h2>
        <div id="perf-status"></div>
      </div>
    </div>

    <div>
      <button onclick="clearLogs()">Clear Logs</button>
      <button onclick="exportDiagnostics()">📋 Export Diagnostics</button>
      <button onclick="location.reload()">🔄 Reload Page</button>
    </div>
  </div>

  <script>
    const logs = {
      ticks: [],
      updates: [],
      charts: [],
    };

    const HISTORY_SIZE = 20;

    // Hook into console.log to capture diagnostic messages
    const originalLog = console.log;
    console.log = function(...args) {
      const msg = args.join(' ');
      
      if (msg.includes('TICK RECEIVED') || msg.includes('📥')) {
        logs.ticks.unshift(msg);
        if (logs.ticks.length > HISTORY_SIZE) logs.ticks.pop();
        updateTickLog();
      } else if (msg.includes('price:') || msg.includes('MARKET DATA')) {
        logs.updates.unshift(msg);
        if (logs.updates.length > HISTORY_SIZE) logs.updates.pop();
        updateUpdateLog();
      } else if (msg.includes('CHART UPDATE') || msg.includes('📊')) {
        logs.charts.unshift(msg);
        if (logs.charts.length > HISTORY_SIZE) logs.charts.pop();
        updateChartLog();
      }
      
      originalLog.apply(console, args);
    };

    function updateTickLog() {
      const el = document.querySelector('#tick-log');
      el.innerHTML = logs.ticks.map(msg => 
        `<div class="log-entry tick">${escapeHtml(msg)}</div>`
      ).join('');
    }

    function updateUpdateLog() {
      const el = document.querySelector('#update-log');
      el.innerHTML = logs.updates.map(msg =>
        `<div class="log-entry update">${escapeHtml(msg)}</div>`
      ).join('');
    }

    function updateChartLog() {
      const el = document.querySelector('#chart-log');
      el.innerHTML = logs.charts.map(msg =>
        `<div class="log-entry chart">${escapeHtml(msg)}</div>`
      ).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function updateStatus() {
      // WebSocket status
      const wsEl = document.querySelector('#ws-status');
      wsEl.innerHTML = `
        <div class="stat">
          <span class="stat-label">Binance Ticker WS:</span>
          <span><span class="status ${typeof btcusdt !== 'undefined' ? 'online' : 'offline'}"></span> ${typeof btcusdt !== 'undefined' ? 'Connected' : 'Disconnected'}</span>
        </div>
        <div class="stat">
          <span class="stat-label">Kline WebSocket:</span>
          <span><span class="status offline"></span> Check Browser DevTools → Network</span>
        </div>
      `;

      // Real Data Adapter status
      const rdaEl = document.querySelector('#rda-status');
      if (typeof RealDataAdapter !== 'undefined') {
        const cache = RealDataAdapter.getAllCachedData();
        rdaEl.innerHTML = `
          <div class="stat">
            <span class="stat-label">Status:</span>
            <span style="color: #5fb38e;">● Active</span>
          </div>
          <div class="stat">
            <span class="stat-label">Cached Assets:</span>
            <span class="stat-value">${Object.keys(cache).length}</span>
          </div>
          <div class="stat">
            <span class="stat-label">Real Data Enabled:</span>
            <span style="color: #5fb38e;">${RealDataAdapter.isRealDataEnabled() ? '✓ Yes' : '✗ No'}</span>
          </div>
        `;
      } else {
        rdaEl.innerHTML = '<div class="log-entry error">❌ Module not loaded</div>';
      }

      // Market Data status
      const mdEl = document.querySelector('#md-status');
      if (typeof MarketData !== 'undefined') {
        const assets = MarketData.getAllAssets();
        mdEl.innerHTML = `
          <div class="stat">
            <span class="stat-label">Status:</span>
            <span style="color: #5fb38e;">● Active</span>
          </div>
          <div class="stat">
            <span class="stat-label">Total Assets:</span>
            <span class="stat-value">${assets.length}</span>
          </div>
          <div class="stat">
            <span class="stat-label">Ticker Tick Rate:</span>
            <span class="stat-value">600ms (desktop) / 3000ms (mobile)</span>
          </div>
        `;
      } else {
        mdEl.innerHTML = '<div class="log-entry error">❌ Module not loaded</div>';
      }

      // Chart Engine status
      const chartEl = document.querySelector('#chart-status');
      chartEl.innerHTML = `
        <div class="stat">
          <span class="stat-label">Status:</span>
          <span style="color: #8b98ad;">Check browser console for update logs</span>
        </div>
        <div class="stat">
          <span class="stat-label">Data Source:</span>
          <span class="stat-value">Binance WebSocket + REST Fallback</span>
        </div>
        <div class="stat">
          <span class="stat-label">Update Interval:</span>
          <span class="stat-value">250ms (WS) / 500ms (REST)</span>
        </div>
      `;

      // Performance
      const perfEl = document.querySelector('#perf-status');
      let perfHtml = '';
      if (performance.memory) {
        const used = Math.round(performance.memory.usedJSHeapSize / 1048576);
        const total = Math.round(performance.memory.jsHeapSizeLimit / 1048576);
        perfHtml += `
          <div class="stat">
            <span class="stat-label">Memory Usage:</span>
            <span class="stat-value">${used}MB / ${total}MB</span>
          </div>
        `;
      }
      perfHtml += `
        <div class="stat">
          <span class="stat-label">Tick Rate:</span>
          <span class="stat-value">Real-time from Binance</span>
        </div>
        <div class="stat">
          <span class="stat-label">Market Data Tick:</span>
          <span class="stat-value">Every 600ms</span>
        </div>
      `;
      perfEl.innerHTML = perfHtml;

      // Check for issues
      const issues = [];
      if (logs.ticks.length === 0 && logs.updates.length === 0) {
        issues.push('No data arriving from Binance');
      }
      if (logs.charts.length === 0) {
        issues.push('Charts not updating');
      }

      if (issues.length > 0) {
        document.querySelector('#warning-panel').style.display = 'block';
        document.querySelector('#warning-text').textContent = issues.join(', ');
      }
    }

    function clearLogs() {
      logs.ticks = [];
      logs.updates = [];
      logs.charts = [];
      updateTickLog();
      updateUpdateLog();
      updateChartLog();
    }

    function exportDiagnostics() {
      const data = {
        timestamp: new Date().toISOString(),
        logs,
        browserInfo: {
          userAgent: navigator.userAgent,
          platform: navigator.platform,
          language: navigator.language,
        },
        performance: performance.memory ? {
          memory: {
            usedJSHeapSize: performance.memory.usedJSHeapSize,
            jsHeapSizeLimit: performance.memory.jsHeapSizeLimit,
          }
        } : null,
      };

      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `zen-diagnostics-${Date.now()}.json`;
      link.click();
      URL.revokeObjectURL(url);
    }

    // Update every 500ms
    setInterval(updateStatus, 500);
    updateStatus();
  </script>
</body>
</html>
